[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://degree-checker-01-meta-new-space.hf.space"
  NEXT_PUBLIC_SUPABASE_URL = "https://huhjrgjcmbwbjouvwusa.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_yku8_ypMWukKtJcRz19-yQ_pClSQ9jD"

# SPA fallback — redirect all routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
